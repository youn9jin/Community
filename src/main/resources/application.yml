spring:
  application:
    name: Community

  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: jdbc:mysql://localhost:3306/community?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

JWT_SECRET: ${JWT_SECRET}
JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

file:
  upload-dir: ./uploads

server:
  shutdown: graceful
  tomcat:
    threads:
      max: 100
      min-spare: 10   # 기본값과 동일 — 문서화 목적
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, db
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

cloud:
  aws:
    region:
      static: ap-northeast-2
